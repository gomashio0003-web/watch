<!doctype html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

        <nav class="navbar text-bg-danger fixed-top">
            <div class="container">
                <a class="navbar-brand" href="#"><img class="logo-main" src="images/logo.png" alt="logo"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end text-body-tertiary" tabindex="-1" id="offcanvasDarkNavbar" aria-labelledby="offcanvasDarkNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">世界の時計オンラインメニュー</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">ホーム</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">サービス</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        会社概要
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href="#">Another action</a></li>

                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                    </ul>
                    <form class="d-flex mt-3" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                    <button class="btn text-bg-danger" type="submit">検索</button>
                    </form>
                </div>
                </div>
            </div>
        </nav> 
    </header>
    <main>
        <section id="items">
            <div class="container pt-5 mt-5">
                <div class="row">
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_01.jpg" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_02.jpg" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_03.jpg" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_04.jpg" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_05.jpg" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_06.jpg" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_07.jpg" class="rounded-circle img-fluid">
                    </div>
                    <div class="col-6 col-md-4 col-lg-3 g-3">
                        <img src="images/item_08.jpg" class="rounded-circle img-fluid">
                    </div>
                </div>
            </div>
        </section>
        <section id="hero">
            <div class="container">
                <div class="bg-body-secondary p-5 mt-5 rounded">
                    <h1>時計の世界オンライン</h1>
                    <p class="lead">
                    ユーザ登録とは、無料でお客様の情報をご登録いただける機能です。
                    お気に入り登録した時計情報をいつでも閲覧できます。
                    </p>
                    <!-- モーダルのボタン -->
                    <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    ユーザ登録をする
                    </button>
                    <!-- モーダルウィンドウの中身 -->
                    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                            <div class="modal-header">
                                <h1 class="modal-title fs-5" id="exampleModalLabel">ユーザ登録をする</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <form>
                                    <div class="mb-3">
                                        <label for="exampleInputEmail1" class="form-label">メールアドレス</label>
                                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                                        <div id="emailHelp" class="form-text">お客様のメールアドレスを入力してください。</div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="exampleInputPassword1" class="form-label">パスワード</label>
                                        <input type="password" class="form-control" id="exampleInputPassword1">
                                    </div>
                                    <div class="mb-3 form-check">
                                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                                        <label class="form-check-label" for="exampleCheck1">確認しました。</label>
                                    </div>
                                    <button type="submit" class="btn btn-danger">新規登録する</button>
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                                <button type="button" class="btn text-bg-danger">登録画面へ進む</button>
                            </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="text-bg-danger text-center p-5 mt-5">
            <div class="py-5"><img src="images/logo.png"></div>
            <p><small>世界の時計 copyright &copy;2026</small></p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
